<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page to Markdown</title>
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <p class="kicker">Page to Markdown</p>
        <h1>Turn this tab into something usable.</h1>
        <p class="lede">
          Extract the readable content, then copy it as Markdown or plain text, or save it as a
          Markdown file.
        </p>

        <div class="tab-meta" id="tab-meta">
          <p class="tab-title" id="tab-title">Checking the current tab...</p>
          <p class="tab-url" id="tab-url">Only regular web pages are supported.</p>
        </div>

        <div class="actions">
          <button class="action action-primary" data-action="copy-markdown">Copy Markdown</button>
          <button class="action" data-action="copy-text">Copy Plain Text</button>
          <button class="action" data-action="download-markdown">Download .md</button>
        </div>

        <div class="status-wrap">
          <p class="status" id="status" role="status">Open any article or page and choose an action.</p>
          <p class="details" id="details"></p>
        </div>
      </section>
    </main>
  </body>
</html>
